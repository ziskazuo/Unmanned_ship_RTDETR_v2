_BASE_: [
  '../datasets/sealand_single_tower_radarcamera_4km_super4_960_route_roi.yml',
  '../runtime_radar.yml',
  '_base_/sealand_radardetr_reader_960_super4.yml',
  '_base_/radardetr_r50vd_route_roi_p2.yml',
]

epoch: 16
metric: RBOX_COCO_STYLE
iou_thresholds: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
# Record both 4-class and ship-only metrics at every validation epoch.
enable_ship_only_eval: True
# Persist per-epoch eval snapshots for quick mid-training diagnosis.
record_eval_history: True
eval_history_file: eval_history.jsonl
# Stop immediately when NaN/Inf appears to avoid wasting GPU time.
stop_on_nonfinite_loss: True
save_dir: output/sealand_radardetr_r50vd_route_roi_p2_16e_bs2x4_fp32_test400_onlineval_4km_super4_960
weights: output/sealand_radardetr_r50vd_route_roi_p2_16e_bs2x4_fp32_test400_onlineval_4km_super4_960/best_model
find_unused_parameters: True
convert_sync_bn: False
log_iter: 20
snapshot_epoch: 1
worker_num: 4
# If AP50 is within 0.1 percentage points, prefer higher mAP50:90.
best_model_ap50_tie_margin: 0.001

TrainReader:
  batch_size: 2

EvalReader:
  batch_size: 1

EvalDataset:
  !CameraRadar_COCODataSet
    dataset_dir: /data1/zuokun/code/USV/Unmanned_ship_RTDETR_v2/prepared/sealand_single_tower_4km_super4_960_route_roi
    radar_image_dir: ''
    camera_image_dir: ''
    anno_path: test_onlineval_random400_seed20260327.json
    data_fields: ['image', 'gt_bbox', 'gt_class', 'is_crowd', 'gt_poly', 'gt_primary_camera', 'gt_visible_cameras', 'gt_camera_box_2d', 'gt_has_camera_box']
    allow_empty: true

LearningRate:
  # Keep LR at 1e-4 because 4 GPUs x 2/GPU restores the original intended global batch 8.
  base_lr: 0.0001
  schedulers:
    - !CosineDecay
      max_epochs: 16
      use_warmup: true
    - !LinearWarmup
      start_factor: 0.001
      steps: 800

OptimizerBuilder:
  clip_grad_by_norm: 0.1
  regularizer: false
  optimizer:
    type: AdamW
    weight_decay: 0.0001
