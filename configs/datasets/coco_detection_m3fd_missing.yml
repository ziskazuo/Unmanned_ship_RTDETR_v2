metric: COCO
num_classes: 6

TrainDataset:
  name: Mutisprctral_COCODataSet
  vis_image_dir: train_vis_img_missing
  ir_image_dir : train_ir_img_missing
  anno_path: annotations_missing/train_missing.json
  dataset_dir: /data/hdd/guojunjie/paddle_detection_datasets/coco_m3fd_missing
  data_fields: ['image', 'gt_bbox', 'gt_class', 'is_crowd']

EvalDataset:
  name: Mutisprctral_COCODataSet
  vis_image_dir: val_vis_img_missing
  #vis_image_dir: new_mask
  ir_image_dir: val_ir_img_missing
  #ir_image_dir: new_mask
  anno_path: annotations_missing/val_missing.json
  dataset_dir: /data/hdd/guojunjie/paddle_detection_datasets/coco_m3fd_missing
  allow_empty: trues

TestDataset:
  name: Multi_ImageFolder
  anno_path: annotations_missing/label_list.txt # also support txt (like VOC's label_list.txt)
  dataset_dir: /data/hdd/guojunjie/paddle_detection_datasets/coco_m3fd_missing # if set, anno_path will be 'dataset_dir/anno_path'
